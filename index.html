<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5" />
  <title>Bingo Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="toolbar" class="toolbar">
    <div class="toolbar-top">
      <h1>Bingo Builder</h1>
      <div class="toolbar-actions">
        <button id="fullScreenBtn" type="button" title="Full screen lock mode" aria-label="Toggle full screen lock mode">⛶ Full</button>
        <button id="collapseUiBtn" type="button" title="Collapse controls" aria-label="Collapse controls">▴</button>
      </div>
    </div>

    <div class="controls">
      <label>Rows <input id="rowsInput" type="number" min="1" max="12" value="5" /></label>
      <label>Cols <input id="colsInput" type="number" min="1" max="12" value="5" /></label>
      <button id="newBoardBtn">New Board</button>

      <label>Scale
        <input id="scaleInput" type="range" min="60" max="180" value="100" />
      </label>

      <label>Zoom
        <input id="zoomInput" type="range" min="40" max="300" value="100" />
      </label>

      <button id="lockBtn" class="warn">Lock Layout</button>
      <label class="stamp-toggle">
        <input id="stampModeInput" type="checkbox" checked /> Stamp Mode
      </label>

      <label>Stamp
        <select id="stampSelect">
          <option value="✅">✅</option>
          <option value="⭐">⭐</option>
          <option value="❌">❌</option>
          <option value="🔥">🔥</option>
          <option value="💡">💡</option>
        </select>
      </label>

      <button id="clearStampsBtn">Clear Stamps</button>
      <button id="resetBoardBtn">Reset Board</button>
    </div>
  </header>

  <main>
    <p class="hint">
      Unlocked: click tile text to edit. Tile positions are fixed.<br>
      Locked: layout/text are locked, but stamp mode can still place translucent stamps. Long-press or double-tap a stamped tile to remove its stamp.
    </p>
    <section id="board" class="board" aria-label="Bingo board">
      <div id="boardCanvas" class="board-canvas"></div>
      <div id="effectsLayer" class="effects-layer" aria-hidden="true"></div>
    </section>
  </main>

  <template id="tileTemplate">
    <article class="tile">
      <div class="tile-content" contenteditable="true"></div>
      <div class="stamps"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
